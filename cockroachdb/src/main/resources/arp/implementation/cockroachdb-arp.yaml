    # -----------------------------------------------------------------------
    # Date/time extraction — CockroachDB uses EXTRACT(field FROM source)
    # -----------------------------------------------------------------------
    - names:
      - "extract_year"
      signatures:
      - args: ["date"]
        return: "bigint"
        rewrite: "EXTRACT(YEAR FROM {0})::INT"
      - args: ["timestamp"]
        return: "bigint"
        rewrite: "EXTRACT(YEAR FROM {0})::INT"

    - names:
      - "extract_month"
      signatures:
      - args: ["date"]
        return: "bigint"
        rewrite: "EXTRACT(MONTH FROM {0})::INT"
      - args: ["timestamp"]
        return: "bigint"
        rewrite: "EXTRACT(MONTH FROM {0})::INT"

    - names:
      - "extract_day"
      signatures:
      - args: ["date"]
        return: "bigint"
        rewrite: "EXTRACT(DAY FROM {0})::INT"
      - args: ["timestamp"]
        return: "bigint"
        rewrite: "EXTRACT(DAY FROM {0})::INT"

    - names:
      - "extract_hour"
      signatures:
      - args: ["timestamp"]
        return: "bigint"
        rewrite: "EXTRACT(HOUR FROM {0})::INT"
      - args: ["date"]
        return: "bigint"
        rewrite: "0"

    - names:
      - "extract_minute"
      signatures:
      - args: ["timestamp"]
        return: "bigint"
        rewrite: "EXTRACT(MINUTE FROM {0})::INT"
      - args: ["date"]
        return: "bigint"
        rewrite: "0"

    - names:
      - "extract_second"
      signatures:
      - args: ["timestamp"]
        return: "bigint"
        rewrite: "EXTRACT(SECOND FROM {0})::INT"
      - args: ["date"]
        return: "bigint"
        rewrite: "0"

    - names:
      - "extract_dow"
      signatures:
      - args: ["date"]
        return: "bigint"
        rewrite: "EXTRACT(DOW FROM {0})::INT"
      - args: ["timestamp"]
        return: "bigint"
        rewrite: "EXTRACT(DOW FROM {0})::INT"

    - names:
      - "extract_doy"
      signatures:
      - args: ["date"]
        return: "bigint"
        rewrite: "EXTRACT(DOY FROM {0})::INT"
      - args: ["timestamp"]
        return: "bigint"
        rewrite: "EXTRACT(DOY FROM {0})::INT"

    - names:
      - "extract_quarter"
      signatures:
      - args: ["date"]
        return: "bigint"
        rewrite: "EXTRACT(QUARTER FROM {0})::INT"
      - args: ["timestamp"]
        return: "bigint"
        rewrite: "EXTRACT(QUARTER FROM {0})::INT"

    - names:
      - "extract_week"
      signatures:
      - args: ["date"]
        return: "bigint"
        rewrite: "EXTRACT(WEEK FROM {0})::INT"
      - args: ["timestamp"]
        return: "bigint"
        rewrite: "EXTRACT(WEEK FROM {0})::INT"

    # date_trunc_* omitted: ARP with identifier_quote='"' incorrectly converts
    # the string literal 'month' to the identifier "month", causing CockroachDB
    # to error with "column does not exist". Dremio handles DATE_TRUNC in-memory.

    # -----------------------------------------------------------------------
    # Timestamp add — interval arithmetic (integer * INTERVAL '1 unit')
    # -----------------------------------------------------------------------
    - names:
      - "timestampadd_year"
      signatures:
      - args: ["integer", "timestamp"]
        return: "timestamp"
        rewrite: "{1} + ({0} * INTERVAL '1 year')"
      - args: ["bigint", "timestamp"]
        return: "timestamp"
        rewrite: "{1} + ({0} * INTERVAL '1 year')"
      - args: ["integer", "date"]
        return: "date"
        rewrite: "({1} + ({0} * INTERVAL '1 year'))::DATE"
      - args: ["bigint", "date"]
        return: "date"
        rewrite: "({1} + ({0} * INTERVAL '1 year'))::DATE"

    - names:
      - "timestampadd_quarter"
      signatures:
      - args: ["integer", "timestamp"]
        return: "timestamp"
        rewrite: "{1} + ({0} * INTERVAL '3 months')"
      - args: ["bigint", "timestamp"]
        return: "timestamp"
        rewrite: "{1} + ({0} * INTERVAL '3 months')"
      - args: ["integer", "date"]
        return: "date"
        rewrite: "({1} + ({0} * INTERVAL '3 months'))::DATE"
      - args: ["bigint", "date"]
        return: "date"
        rewrite: "({1} + ({0} * INTERVAL '3 months'))::DATE"

    - names:
      - "timestampadd_month"
      signatures:
      - args: ["integer", "timestamp"]
        return: "timestamp"
        rewrite: "{1} + ({0} * INTERVAL '1 month')"
      - args: ["bigint", "timestamp"]
        return: "timestamp"
        rewrite: "{1} + ({0} * INTERVAL '1 month')"
      - args: ["integer", "date"]
        return: "date"
        rewrite: "({1} + ({0} * INTERVAL '1 month'))::DATE"
      - args: ["bigint", "date"]
        return: "date"
        rewrite: "({1} + ({0} * INTERVAL '1 month'))::DATE"

    - names:
      - "timestampadd_week"
      signatures:
      - args: ["integer", "timestamp"]
        return: "timestamp"
        rewrite: "{1} + ({0} * INTERVAL '1 week')"
      - args: ["bigint", "timestamp"]
        return: "timestamp"
        rewrite: "{1} + ({0} * INTERVAL '1 week')"
      - args: ["integer", "date"]
        return: "date"
        rewrite: "({1} + ({0} * INTERVAL '1 week'))::DATE"
      - args: ["bigint", "date"]
        return: "date"
        rewrite: "({1} + ({0} * INTERVAL '1 week'))::DATE"

    - names:
      - "timestampadd_day"
      signatures:
      - args: ["integer", "timestamp"]
        return: "timestamp"
        rewrite: "{1} + ({0} * INTERVAL '1 day')"
      - args: ["bigint", "timestamp"]
        return: "timestamp"
        rewrite: "{1} + ({0} * INTERVAL '1 day')"
      - args: ["integer", "date"]
        return: "date"
        rewrite: "({1} + ({0} * INTERVAL '1 day'))::DATE"
      - args: ["bigint", "date"]
        return: "date"
        rewrite: "({1} + ({0} * INTERVAL '1 day'))::DATE"

    - names:
      - "timestampadd_hour"
      signatures:
      - args: ["integer", "timestamp"]
        return: "timestamp"
        rewrite: "{1} + ({0} * INTERVAL '1 hour')"
      - args: ["bigint", "timestamp"]
        return: "timestamp"
        rewrite: "{1} + ({0} * INTERVAL '1 hour')"
      - args: ["integer", "date"]
        return: "timestamp"
        rewrite: "CAST({1} AS TIMESTAMP) + ({0} * INTERVAL '1 hour')"
      - args: ["bigint", "date"]
        return: "timestamp"
        rewrite: "CAST({1} AS TIMESTAMP) + ({0} * INTERVAL '1 hour')"

    - names:
      - "timestampadd_minute"
      signatures:
      - args: ["integer", "timestamp"]
        return: "timestamp"
        rewrite: "{1} + ({0} * INTERVAL '1 minute')"
      - args: ["bigint", "timestamp"]
        return: "timestamp"
        rewrite: "{1} + ({0} * INTERVAL '1 minute')"
      - args: ["integer", "date"]
        return: "timestamp"
        rewrite: "CAST({1} AS TIMESTAMP) + ({0} * INTERVAL '1 minute')"
      - args: ["bigint", "date"]
        return: "timestamp"
        rewrite: "CAST({1} AS TIMESTAMP) + ({0} * INTERVAL '1 minute')"

    - names:
      - "timestampadd_second"
      signatures:
      - args: ["integer", "timestamp"]
        return: "timestamp"
        rewrite: "{1} + ({0} * INTERVAL '1 second')"
      - args: ["bigint", "timestamp"]
        return: "timestamp"
        rewrite: "{1} + ({0} * INTERVAL '1 second')"
      - args: ["integer", "date"]
        return: "timestamp"
        rewrite: "CAST({1} AS TIMESTAMP) + ({0} * INTERVAL '1 second')"
      - args: ["bigint", "date"]
        return: "timestamp"
        rewrite: "CAST({1} AS TIMESTAMP) + ({0} * INTERVAL '1 second')"

    # -----------------------------------------------------------------------
    # Timestamp diff — uses EXTRACT(epoch ...) / divisor for sub-day units,
    #                   AGE() for year/month/quarter differences
    # -----------------------------------------------------------------------
    - names:
      - "timestampdiff_year"
      signatures:
      - args: ["timestamp", "timestamp"]
        return: "integer"
        rewrite: "EXTRACT(YEAR FROM AGE({1}, {0}))::INT"
      - args: ["date", "date"]
        return: "integer"
        rewrite: "EXTRACT(YEAR FROM AGE({1}::TIMESTAMP, {0}::TIMESTAMP))::INT"

    - names:
      - "timestampdiff_quarter"
      signatures:
      - args: ["timestamp", "timestamp"]
        return: "integer"
        rewrite: "(EXTRACT(YEAR FROM AGE({1}, {0})) * 4 + EXTRACT(MONTH FROM AGE({1}, {0})) / 3)::INT"
      - args: ["date", "date"]
        return: "integer"
        rewrite: "(EXTRACT(YEAR FROM AGE({1}::TIMESTAMP, {0}::TIMESTAMP)) * 4 + EXTRACT(MONTH FROM AGE({1}::TIMESTAMP, {0}::TIMESTAMP)) / 3)::INT"

    - names:
      - "timestampdiff_month"
      signatures:
      - args: ["timestamp", "timestamp"]
        return: "integer"
        rewrite: "(EXTRACT(YEAR FROM AGE({1}, {0})) * 12 + EXTRACT(MONTH FROM AGE({1}, {0})))::INT"
      - args: ["date", "date"]
        return: "integer"
        rewrite: "(EXTRACT(YEAR FROM AGE({1}::TIMESTAMP, {0}::TIMESTAMP)) * 12 + EXTRACT(MONTH FROM AGE({1}::TIMESTAMP, {0}::TIMESTAMP)))::INT"

    - names:
      - "timestampdiff_week"
      signatures:
      - args: ["timestamp", "timestamp"]
        return: "integer"
        rewrite: "(EXTRACT(epoch FROM ({1} - {0})) / 604800)::INT"
      - args: ["date", "date"]
        return: "integer"
        rewrite: "(EXTRACT(epoch FROM ({1}::TIMESTAMP - {0}::TIMESTAMP)) / 604800)::INT"

    - names:
      - "timestampdiff_day"
      signatures:
      - args: ["timestamp", "timestamp"]
        return: "integer"
        rewrite: "(EXTRACT(epoch FROM ({1} - {0})) / 86400)::INT"
      - args: ["date", "date"]
        return: "integer"
        rewrite: "(EXTRACT(epoch FROM ({1}::TIMESTAMP - {0}::TIMESTAMP)) / 86400)::INT"

    - names:
      - "timestampdiff_hour"
      signatures:
      - args: ["timestamp", "timestamp"]
        return: "integer"
        rewrite: "(EXTRACT(epoch FROM ({1} - {0})) / 3600)::INT"

    - names:
      - "timestampdiff_minute"
      signatures:
      - args: ["timestamp", "timestamp"]
        return: "integer"
        rewrite: "(EXTRACT(epoch FROM ({1} - {0})) / 60)::INT"
      - args: ["date", "date"]
        return: "integer"
        rewrite: "(EXTRACT(epoch FROM ({1}::TIMESTAMP - {0}::TIMESTAMP)) / 60)::INT"

    - names:
      - "timestampdiff_second"
      signatures:
      - args: ["timestamp", "timestamp"]
        return: "integer"
        rewrite: "EXTRACT(epoch FROM ({1} - {0}))::INT"
      - args: ["date", "date"]
        return: "integer"
        rewrite: "EXTRACT(epoch FROM ({1}::TIMESTAMP - {0}::TIMESTAMP))::INT"

    # -----------------------------------------------------------------------
    # Date conversion
    # -----------------------------------------------------------------------
    - names:
      - "to_date"
      signatures:
      - args: ["date"]
        return: "date"
        rewrite: "{0}"
      - args: ["timestamp"]
        return: "date"
        rewrite: "CAST({0} AS DATE)"
      - args: ["varchar"]
        return: "date"
        rewrite: "CAST({0} AS DATE)"
      - args: ["varchar", "varchar"]
        return: "date"
        rewrite: "CAST({0} AS DATE)"

    - names:
      - "now"
      - "current_timestamp"
      signatures:
      - args: []
        return: "timestamp"
        rewrite: "NOW()"

    - names:
      - "current_date"
      signatures:
      - args: []
        return: "date"
        rewrite: "CURRENT_DATE"

  # -------------------------------------------------------------------------
  # Variable-length operators
  # -------------------------------------------------------------------------
  variable_length_operators:
  - names:
    - "concat"
    variable_signatures:
    - return: "varchar"
      arg_type: "varchar"
  - names:
    - "and"
    variable_signatures:
    - return: "boolean"
      arg_type: "boolean"
  - names:
    - "or"
    variable_signatures:
    - return: "boolean"
      arg_type: "boolean"
  - names:
    - "coalesce"
    variable_signatures:
    - return: "double"
      arg_type: "double"
    - return: "float"
      arg_type: "float"
    - return: "integer"
      arg_type: "integer"
    - return: "bigint"
      arg_type: "bigint"
    - return: "decimal"
      arg_type: "decimal"
    - return: "varchar"
      arg_type: "varchar"
    - return: "boolean"
      arg_type: "boolean"
    - return: "date"
      arg_type: "date"
    - return: "timestamp"
