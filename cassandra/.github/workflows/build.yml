name: Build

# Triggers: every push to any branch, and every pull request.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    name: Compile & package connector JAR
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java 11 ───────────────────────────────────────────────────────────
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          # Cache ~/.m2/repository between runs — skips re-downloading Dremio
          # and DataStax JARs on every push (first run: ~3 min; subsequent: ~45 s)
          cache: 'maven'

      # ── 3. Install Dremio JARs ───────────────────────────────────────────────
      # Dremio's JARs are not in Maven Central. The pom.xml references
      # https://maven.dremio.com/public/ where Dremio OSS releases are published.
      # If the exact build-stamp version (e.g. 26.0.5-20250909…) is not available
      # on the public repo, we fall back to extracting JARs from the official
      # Dremio OSS Docker image and installing them to the local Maven cache.
      - name: Install Dremio JARs to local Maven repo
        env:
          DREMIO_VERSION: 26.0.5-202509091642240013-f5051a07
          DREMIO_IMAGE: dremio/dremio-oss:26.0
        run: |
          echo "Pulling Dremio OSS image: $DREMIO_IMAGE"
          docker pull "$DREMIO_IMAGE" --quiet

          # Create a temporary container (don't start it — we only need the filesystem)
          CONTAINER=$(docker create "$DREMIO_IMAGE")
          mkdir -p /tmp/dremio-jars

          # Copy all Dremio JARs out of the container
          docker cp "${CONTAINER}:/opt/dremio/jars" /tmp/dremio-jars/
          docker rm "$CONTAINER" > /dev/null

          JARS_DIR=/tmp/dremio-jars/jars

          # Install each artifact needed by pom.xml into the local Maven repo,
          # using the exact version string the pom expects.
          install_jar() {
            local artifact="$1"
            local jar
            jar=$(ls "${JARS_DIR}/${artifact}"-[0-9]*.jar 2>/dev/null | head -1)
            if [ -z "$jar" ]; then
              echo "  WARN: JAR not found for ${artifact} — skipping"
              return
            fi
            mvn install:install-file -q \
              -Dfile="$jar" \
              -DgroupId=com.dremio \
              -DartifactId="$artifact" \
              -Dversion="$DREMIO_VERSION" \
              -Dpackaging=jar
            echo "  ✓ installed ${artifact}"
          }

          echo "Installing Dremio JARs..."
          install_jar dremio-sabot-kernel
          install_jar dremio-common
          install_jar dremio-sabot-kernel-proto
          install_jar dremio-sabot-vector-tools
          install_jar dremio-protocol
          install_jar dremio-connector
          install_jar dremio-sabot-logical
          install_jar dremio-common-core
          echo "Dremio JAR installation complete."

      # ── 4. Build ─────────────────────────────────────────────────────────────
      # -DskipTests: unit tests that require a live Cassandra cluster are skipped
      #              in CI (integration testing is done manually against try-dremio)
      # --batch-mode: suppresses interactive download progress bars in CI logs
      - name: Build connector JAR
        run: mvn package -DskipTests --batch-mode

      # ── 5. Smoke-check the output ────────────────────────────────────────────
      - name: Verify plugin JAR was produced
        run: |
          JAR=$(ls target/dremio-cassandra-connector-*-plugin.jar 2>/dev/null | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: plugin JAR not found in target/"
            exit 1
          fi
          SIZE=$(du -sh "$JAR" | cut -f1)
          echo "✓ Build succeeded: $(basename $JAR) (${SIZE})"

      # ── 6. Upload JAR as build artifact ─────────────────────────────────────
      # The JAR is retained for 7 days so you can download it from the Actions UI
      # without having to re-run a build locally.
      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: dremio-cassandra-connector-plugin
          path: target/dremio-cassandra-connector-*-plugin.jar
          retention-days: 7
