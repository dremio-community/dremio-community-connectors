# =============================================================================
# docker-compose.yml — Local testing environment for dremio-kafka-connector
#
# Starts:
#   - Apache Kafka (KRaft mode, no ZooKeeper)
#   - Confluent Schema Registry (for AVRO tests)
#   - MinIO (S3-compatible object store for CTAS tests)
#   - Dremio OSS
#   - kafka-seed (produces sample JSON + AVRO messages into test topics)
#
# Usage:
#   docker compose up -d
#   # Wait ~60 seconds for Dremio to become ready
#   ./install.sh --docker dremio
#   ./add-kafka-source.sh --name kafka_test --brokers localhost:9092
#   ./test-connection.sh --topic orders
#   ./test-avro.sh --topic orders_avro
#
#   # Tear down (keeps volumes):
#   docker compose down
#
#   # Full reset (removes all data):
#   docker compose down -v
# =============================================================================

name: dremio-kafka-test

services:

  # ---------------------------------------------------------------------------
  # Kafka (KRaft mode — no ZooKeeper required)
  # ---------------------------------------------------------------------------
  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    ports:
      - "9092:9092"    # external (host) access
      - "9093:9093"    # controller listener (internal)
    environment:
      # KRaft settings
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listeners
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Topic defaults
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 4
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_LOG_RETENTION_HOURS: 168     # 7 days
      KAFKA_CFG_LOG_SEGMENT_BYTES: 104857600 # 100 MB

      # Performance tuning for testing
      KAFKA_CFG_MESSAGE_MAX_BYTES: 10485760  # 10 MB

    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

    volumes:
      - kafka-data:/bitnami/kafka

  # ---------------------------------------------------------------------------
  # Confluent Schema Registry (for AVRO tests)
  # ---------------------------------------------------------------------------
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC: _schemas
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_DEBUG: "false"

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects > /dev/null"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object store for CTAS → Iceberg tests
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # MinIO console (http://localhost:9001)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local 2>/dev/null || curl -sf http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # Create the test bucket on MinIO startup
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/dremio-test &&
        echo 'Bucket dremio-test ready'
      "
    restart: "no"

  # ---------------------------------------------------------------------------
  # Kafka Seed — produces sample messages into test topics
  # ---------------------------------------------------------------------------
  kafka-seed:
    image: bitnami/kafka:3.7
    container_name: kafka-seed
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      KAFKA_CFG_BOOTSTRAP_SERVERS: kafka:9092
    entrypoint: >
      /bin/bash -c "
        set -e

        echo '=== Creating test topics ==='
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic orders --partitions 4 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic events --partitions 2 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic orders_avro --partitions 4 --replication-factor 1

        echo '=== Producing JSON messages to orders topic ==='
        for i in \$(seq 1 500); do
          PARTITION=\$((i % 4))
          STATUS=\$([ \$((i % 3)) -eq 0 ] && echo 'shipped' || ([ \$((i % 3)) -eq 1 ] && echo 'pending' || echo 'delivered'))
          echo \"{\\\"order_id\\\":\$i,\\\"customer\\\":\\\"customer_\$((i % 50))\\\",\\\"amount\\\":\$((RANDOM % 10000 + 100)),\\\"status\\\":\\\"\$STATUS\\\",\\\"ts\\\":\$(date +%s)}\"
        done | kafka-console-producer.sh \
          --bootstrap-server kafka:9092 \
          --topic orders \
          --property 'parse.key=false'

        echo '=== Producing JSON messages to events topic (with keys) ==='
        for i in \$(seq 1 200); do
          echo \"key_\$((i % 20)):{\\\"event_type\\\":\\\"click\\\",\\\"user_id\\\":\$((i % 100)),\\\"page\\\":\\\"/page/\$((RANDOM % 10))\\\",\\\"session\\\":\\\"sess_\$((RANDOM % 1000))\\\"}\";
        done | kafka-console-producer.sh \
          --bootstrap-server kafka:9092 \
          --topic events \
          --property 'parse.key=true' \
          --property 'key.separator=:'

        echo '=== Producing a few tombstone messages (null value) to events ==='
        for i in \$(seq 1 5); do
          echo \"tombstone_key_\$i:\";
        done | kafka-console-producer.sh \
          --bootstrap-server kafka:9092 \
          --topic events \
          --property 'parse.key=true' \
          --property 'key.separator=:' \
          --property 'null.marker='

        echo '=== Seed complete ==='
        echo 'Topics ready:'
        kafka-topics.sh --bootstrap-server kafka:9092 --list | grep -v '^_'
      "
    restart: "no"

  # ---------------------------------------------------------------------------
  # Dremio OSS
  # ---------------------------------------------------------------------------
  dremio:
    image: dremio/dremio-oss:latest
    container_name: dremio
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "9047:9047"    # Dremio UI + REST API
      - "31010:31010"  # JDBC/ODBC (Arrow Flight)
      - "45678:45678"  # Internal
    environment:
      DREMIO_JAVA_EXTRA_OPTS: >-
        -Ddremio.s3.compat=true
        -Ddremio.s3.endpoint=http://minio:9000
    volumes:
      - dremio-data:/var/lib/dremio
      - dremio-conf:/opt/dremio/conf
      - dremio-logs:/var/log/dremio

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9047/apiv2/server_status | grep -q MASTER_OR_COORDINATOR"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

volumes:
  kafka-data:
  minio-data:
  dremio-data:
  dremio-conf:
  dremio-logs:

# =============================================================================
# Quick-start after everything is up:
#
#   1. Install the Kafka connector into Dremio:
#        ./install.sh --docker dremio
#
#   2. Restart Dremio to load the plugin:
#        docker restart dremio
#        # Wait ~60s for Dremio to come back up
#
#   3. Register the Kafka source:
#        ./add-kafka-source.sh \
#          --name kafka_test \
#          --brokers localhost:9092
#
#   4. Run JSON smoke tests (orders topic):
#        ./test-connection.sh \
#          --topic orders \
#          --s3-source iceberg_minio \
#          --s3-bucket dremio-test
#
#   5. Run AVRO tests (requires Schema Registry):
#        ./test-avro.sh \
#          --topic orders_avro \
#          --schema-registry http://localhost:8081
#
#   MinIO console: http://localhost:9001  (minioadmin / minioadmin)
#   Dremio UI:     http://localhost:9047  (dremio / dremio123)
# =============================================================================
