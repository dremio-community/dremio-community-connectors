name: Build ClickHouse Connector

on:
  push:
    branches: ["**"]
    paths:
      - 'clickhouse/**'
      - '.github/workflows/build-clickhouse.yml'
  pull_request:
    paths:
      - 'clickhouse/**'
      - '.github/workflows/build-clickhouse.yml'

jobs:
  build:
    name: Compile & package ClickHouse connector JAR
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clickhouse

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java 11 ───────────────────────────────────────────────────────────
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      # ── 3. Install Dremio JARs ───────────────────────────────────────────────
      - name: Install Dremio JARs to local Maven repo
        env:
          DREMIO_VERSION: 26.0.5-202509091642240013-f5051a07
          DREMIO_IMAGE: dremio/dremio-oss:26.0
        run: |
          echo "Pulling Dremio OSS image: $DREMIO_IMAGE"
          docker pull "$DREMIO_IMAGE" --quiet

          CONTAINER=$(docker create "$DREMIO_IMAGE")
          mkdir -p /tmp/dremio-jars
          docker cp "${CONTAINER}:/opt/dremio/jars" /tmp/dremio-jars/
          docker rm "$CONTAINER" > /dev/null

          JARS_DIR=/tmp/dremio-jars/jars

          MINIMAL_POM=/tmp/dremio-minimal.pom
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<project><modelVersion>4.0.0</modelVersion>' \
            '<groupId>GROUPID</groupId><artifactId>ARTIFACT</artifactId>' \
            '<version>VERSION</version></project>' > "$MINIMAL_POM"

          install_jar() {
            local artifact="$1" groupId="${2:-com.dremio}"
            local jar
            jar=$(ls "${JARS_DIR}/${artifact}"-[0-9]*.jar 2>/dev/null | head -1)
            if [ -z "$jar" ]; then
              jar=$(ls "${JARS_DIR}/3rdparty/${artifact}"-[0-9]*.jar 2>/dev/null | head -1)
            fi
            if [ -z "$jar" ]; then
              echo "  WARN: JAR not found for ${artifact} — skipping"
              return
            fi
            local pom="/tmp/pom-${artifact}.xml"
            sed -e "s|GROUPID|${groupId}|" \
                -e "s|ARTIFACT|${artifact}|" \
                -e "s|VERSION|${DREMIO_VERSION}|" \
                "$MINIMAL_POM" > "$pom"
            mvn install:install-file -q \
              -Dfile="$jar" \
              -DpomFile="$pom" \
              -Dpackaging=jar
            echo "  ✓ installed ${artifact} (${groupId})"
          }

          install_jar_plugins() {
            local artifact="$1"
            install_jar "$artifact" "com.dremio.plugins"
          }

          echo "Installing Dremio core JARs..."
          install_jar dremio-sabot-kernel
          install_jar dremio-common
          # dremio-sabot-kernel-proto is shaded into dremio-sabot-kernel in the Docker image.
          # Install the kernel JAR under both artifact IDs.
          _kernel_jar=$(ls "${JARS_DIR}/dremio-sabot-kernel"-[0-9]*.jar 2>/dev/null | head -1)
          _proto_pom=/tmp/pom-dremio-sabot-kernel-proto.xml
          sed -e "s|GROUPID|com.dremio|" -e "s|ARTIFACT|dremio-sabot-kernel-proto|" \
              -e "s|VERSION|${DREMIO_VERSION}|" "$MINIMAL_POM" > "$_proto_pom"
          mvn install:install-file -q -Dfile="$_kernel_jar" -DpomFile="$_proto_pom" -Dpackaging=jar
          echo "  ✓ installed dremio-sabot-kernel-proto (aliased from dremio-sabot-kernel)"
          install_jar dremio-sabot-vector-tools
          install_jar dremio-services-namespace
          install_jar dremio-connector
          install_jar dremio-sabot-logical
          install_jar dremio-common-core
          install_jar dremio-services-datastore
          install_jar dremio-services-options
          install_jar dremio-plugin-common        "com.dremio.plugin"
          install_jar dremio-services-credentials "com.dremio.services"

          echo "Installing Dremio CE JDBC JARs..."
          install_jar_plugins dremio-ce-jdbc-plugin
          install_jar_plugins dremio-ce-jdbc-fetcher-api

          # Detect calcite version from JAR filename
          CALCITE_JAR=$(ls "${JARS_DIR}/3rdparty/calcite-core"-*.jar 2>/dev/null | head -1)
          if [ -n "$CALCITE_JAR" ]; then
            CALCITE_VER=$(basename "$CALCITE_JAR" .jar | sed 's/calcite-core-//')
            echo "Detected calcite version: $CALCITE_VER"
            sed -i "s|<calcite.version>.*</calcite.version>|<calcite.version>${CALCITE_VER}</calcite.version>|" pom.xml
          fi

          echo "Dremio JAR installation complete."

      # ── 4. Install ClickHouse JDBC driver & javax.validation ─────────────────
      # JARs are gitignored, so always download from Maven Central.
      # curl is used directly — mvn dependency:get does not support -Ddest.
      - name: Install ClickHouse JDBC driver
        run: |
          echo "Downloading clickhouse-jdbc 0.4.6 from Maven Central..."
          curl -sSfL -o /tmp/clickhouse-jdbc-0.4.6-all.jar \
            "https://repo1.maven.org/maven2/com/clickhouse/clickhouse-jdbc/0.4.6/clickhouse-jdbc-0.4.6-all.jar"
          mvn install:install-file -q \
            -Dfile=/tmp/clickhouse-jdbc-0.4.6-all.jar \
            -DgroupId=com.clickhouse \
            -DartifactId=clickhouse-jdbc \
            -Dversion=0.4.6 \
            -Dclassifier=all \
            -Dpackaging=jar
          echo "✓ ClickHouse JDBC driver installed"

          # javax.validation:validation-api:2.0.2 does not exist on Maven Central
          # (only 2.0.1.Final is published). The APIs are identical — install
          # 2.0.1.Final under version 2.0.2 to satisfy the provided-scope dep.
          echo "Installing javax.validation:validation-api:2.0.2 (aliased from 2.0.1.Final)..."
          curl -sSfL -o /tmp/validation-api-2.0.1.Final.jar \
            "https://repo1.maven.org/maven2/javax/validation/validation-api/2.0.1.Final/validation-api-2.0.1.Final.jar"
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<project><modelVersion>4.0.0</modelVersion>' \
            '<groupId>javax.validation</groupId><artifactId>validation-api</artifactId>' \
            '<version>2.0.2</version></project>' > /tmp/pom-validation-api.xml
          mvn install:install-file -q \
            -Dfile=/tmp/validation-api-2.0.1.Final.jar \
            -DpomFile=/tmp/pom-validation-api.xml \
            -Dpackaging=jar
          echo "✓ javax.validation:validation-api:2.0.2 installed"

      # ── 5. Build ─────────────────────────────────────────────────────────────
      - name: Build connector JAR
        run: mvn package -DskipTests --batch-mode

      # ── 6. Verify output ─────────────────────────────────────────────────────
      - name: Verify plugin JAR was produced
        run: |
          JAR=$(ls target/dremio-clickhouse-connector-*-plugin.jar 2>/dev/null | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: plugin JAR not found in target/"
            exit 1
          fi
          echo "✓ Build succeeded: $(basename $JAR) ($(du -sh $JAR | cut -f1))"

      # ── 7. Upload artifact ───────────────────────────────────────────────────
      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: dremio-clickhouse-connector-plugin
          path: clickhouse/target/dremio-clickhouse-connector-*-plugin.jar
          retention-days: 7
