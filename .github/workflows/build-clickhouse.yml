name: Build ClickHouse Connector

on:
  push:
    branches: ["**"]
    paths:
      - 'clickhouse/**'
      - '.github/workflows/build-clickhouse.yml'
  pull_request:
    paths:
      - 'clickhouse/**'
      - '.github/workflows/build-clickhouse.yml'

jobs:
  build:
    name: Compile & package ClickHouse connector JAR
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clickhouse

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java 11 ───────────────────────────────────────────────────────────
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      # ── 3. Install Dremio JARs ───────────────────────────────────────────────
      # JARs are extracted from the Docker image — they are not on any public
      # Maven repository at this build-stamp version.
      #
      # CRITICAL: Use exact filenames, not globs.
      # The Docker image contains BOTH:
      #   dremio-sabot-kernel-VERSION.jar        ← main JAR (has exec.catalog etc.)
      #   dremio-sabot-kernel-VERSION-proto.jar  ← Protobuf-only classifier JAR
      # A glob like [0-9]*.jar picks the -proto.jar first because '-' (ASCII 45)
      # sorts before '.' (ASCII 46), silently installing the wrong JAR and causing
      # "package com.dremio.exec.catalog does not exist" at compile time.
      #
      # calcite.version is already pinned in pom.xml; Maven resolves it from
      # maven.dremio.com/public automatically.
      - name: Install Dremio JARs from Docker image
        env:
          DREMIO_VER: 26.0.5-202509091642240013-f5051a07
          DREMIO_IMAGE: dremio/dremio-oss:26.0
        run: |
          echo "Pulling $DREMIO_IMAGE..."
          docker pull "$DREMIO_IMAGE" --quiet

          CONTAINER=$(docker create "$DREMIO_IMAGE")
          mkdir -p /tmp/dremio-jars
          docker cp "${CONTAINER}:/opt/dremio/jars" /tmp/dremio-jars/
          docker rm "$CONTAINER" > /dev/null
          J=/tmp/dremio-jars/jars

          rm -rf ~/.m2/repository/com/dremio

          # Write a minimal POM template — no <parent> so Maven never tries to
          # resolve dremio-sabot-parent / dremio-common-parent from the public repo.
          TPOM=/tmp/dremio-pom-template.xml
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<project><modelVersion>4.0.0</modelVersion>' \
            '<groupId>GROUPID</groupId><artifactId>ARTIFACTID</artifactId>' \
            '<version>VERSION</version></project>' > "$TPOM"

          install_jar() {
            local file="$1" gid="$2" aid="$3" ver="$4"
            if [ ! -f "$file" ]; then
              echo "  ERROR: not found: $file"; exit 1
            fi
            local pom="/tmp/pom-${aid}.xml"
            sed -e "s|GROUPID|${gid}|" -e "s|ARTIFACTID|${aid}|" -e "s|VERSION|${ver}|" \
              "$TPOM" > "$pom"
            mvn install:install-file -q -Dfile="$file" -DpomFile="$pom" -Dpackaging=jar
            echo "  ✓ ${gid}:${aid}"
          }

          install_jar_optional() {
            local file="$1" gid="$2" aid="$3" ver="$4"
            if [ ! -f "$file" ]; then
              echo "  SKIP (not in image): $aid — Maven will resolve from remote"
              return
            fi
            local pom="/tmp/pom-${aid}.xml"
            sed -e "s|GROUPID|${gid}|" -e "s|ARTIFACTID|${aid}|" -e "s|VERSION|${ver}|" \
              "$TPOM" > "$pom"
            mvn install:install-file -q -Dfile="$file" -DpomFile="$pom" -Dpackaging=jar
            echo "  ✓ ${gid}:${aid}"
          }

          echo "Installing Dremio core JARs..."
          install_jar "$J/dremio-sabot-kernel-${DREMIO_VER}.jar"         com.dremio          dremio-sabot-kernel         "$DREMIO_VER"
          install_jar "$J/dremio-sabot-kernel-${DREMIO_VER}-proto.jar"   com.dremio          dremio-sabot-kernel-proto   "$DREMIO_VER"
          install_jar "$J/dremio-common-${DREMIO_VER}.jar"               com.dremio          dremio-common               "$DREMIO_VER"
          install_jar "$J/dremio-plugin-common-${DREMIO_VER}.jar"        com.dremio.plugin   dremio-plugin-common        "$DREMIO_VER"
          install_jar "$J/dremio-sabot-vector-tools-${DREMIO_VER}.jar"   com.dremio          dremio-sabot-vector-tools   "$DREMIO_VER"
          install_jar "$J/dremio-services-namespace-${DREMIO_VER}.jar"   com.dremio          dremio-services-namespace   "$DREMIO_VER"
          install_jar "$J/dremio-connector-${DREMIO_VER}.jar"            com.dremio          dremio-connector            "$DREMIO_VER"
          install_jar "$J/dremio-sabot-logical-${DREMIO_VER}.jar"        com.dremio          dremio-sabot-logical        "$DREMIO_VER"
          install_jar "$J/dremio-common-core-${DREMIO_VER}.jar"          com.dremio          dremio-common-core          "$DREMIO_VER"
          install_jar_optional "$J/dremio-services-options-${DREMIO_VER}.jar"    com.dremio          dremio-services-options     "$DREMIO_VER"
          install_jar_optional "$J/dremio-services-credentials-${DREMIO_VER}.jar" com.dremio.services dremio-services-credentials "$DREMIO_VER"

          echo "Installing Dremio CE JDBC JARs..."
          install_jar_optional "$J/dremio-ce-jdbc-plugin-${DREMIO_VER}.jar"      com.dremio.plugins  dremio-ce-jdbc-plugin       "$DREMIO_VER"
          install_jar_optional "$J/dremio-ce-jdbc-fetcher-api-${DREMIO_VER}.jar" com.dremio.plugins  dremio-ce-jdbc-fetcher-api  "$DREMIO_VER"
          echo "Dremio JAR installation complete."

      # ── 4. Install ClickHouse JDBC driver & javax.validation ─────────────────
      # JARs are gitignored, so always download from Maven Central.
      # curl is used directly — mvn dependency:get does not support -Ddest.
      - name: Install ClickHouse JDBC driver
        run: |
          echo "Downloading clickhouse-jdbc 0.4.6 from Maven Central..."
          curl -sSfL -o /tmp/clickhouse-jdbc-0.4.6-all.jar \
            "https://repo1.maven.org/maven2/com/clickhouse/clickhouse-jdbc/0.4.6/clickhouse-jdbc-0.4.6-all.jar"
          mvn install:install-file -q \
            -Dfile=/tmp/clickhouse-jdbc-0.4.6-all.jar \
            -DgroupId=com.clickhouse \
            -DartifactId=clickhouse-jdbc \
            -Dversion=0.4.6 \
            -Dclassifier=all \
            -Dpackaging=jar
          echo "✓ ClickHouse JDBC driver installed"

          # javax.validation:validation-api:2.0.2 does not exist on Maven Central
          # (only 2.0.1.Final is published). The APIs are identical — install
          # 2.0.1.Final under version 2.0.2 to satisfy the provided-scope dep.
          echo "Installing javax.validation:validation-api:2.0.2 (aliased from 2.0.1.Final)..."
          curl -sSfL -o /tmp/validation-api-2.0.1.Final.jar \
            "https://repo1.maven.org/maven2/javax/validation/validation-api/2.0.1.Final/validation-api-2.0.1.Final.jar"
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<project><modelVersion>4.0.0</modelVersion>' \
            '<groupId>javax.validation</groupId><artifactId>validation-api</artifactId>' \
            '<version>2.0.2</version></project>' > /tmp/pom-validation-api.xml
          mvn install:install-file -q \
            -Dfile=/tmp/validation-api-2.0.1.Final.jar \
            -DpomFile=/tmp/pom-validation-api.xml \
            -Dpackaging=jar
          echo "✓ javax.validation:validation-api:2.0.2 installed"

      # ── 5. Build ─────────────────────────────────────────────────────────────
      - name: Build connector JAR
        run: mvn package -DskipTests --batch-mode

      # ── 6. Verify output ─────────────────────────────────────────────────────
      - name: Verify plugin JAR was produced
        run: |
          JAR=$(ls target/dremio-clickhouse-connector-*-plugin.jar 2>/dev/null | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: plugin JAR not found in target/"
            exit 1
          fi
          echo "✓ Build succeeded: $(basename $JAR) ($(du -sh $JAR | cut -f1))"

      # ── 7. Upload artifact ───────────────────────────────────────────────────
      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: dremio-clickhouse-connector-plugin
          path: clickhouse/target/dremio-clickhouse-connector-*-plugin.jar
          retention-days: 7
