name: Build Dataverse Connector

on:
  push:
    branches: ["**"]
    paths:
      - 'dataverse/**'
      - '.github/workflows/build-dataverse.yml'
  pull_request:
    paths:
      - 'dataverse/**'
      - '.github/workflows/build-dataverse.yml'

jobs:
  build:
    name: Compile & package Dataverse connector JAR
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dataverse

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Dremio JARs from Docker image
        env:
          DREMIO_VER: 26.0.5-202509091642240013-f5051a07
          DREMIO_IMAGE: dremio/dremio-oss:26.0
        run: |
          docker pull "$DREMIO_IMAGE" --quiet
          CONTAINER=$(docker create "$DREMIO_IMAGE")
          mkdir -p /tmp/dremio-jars
          docker cp "${CONTAINER}:/opt/dremio/jars" /tmp/dremio-jars/
          docker rm "$CONTAINER" > /dev/null
          J=/tmp/dremio-jars/jars

          rm -rf ~/.m2/repository/com/dremio

          TPOM=/tmp/dremio-pom-template.xml
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<project><modelVersion>4.0.0</modelVersion>' \
            '<groupId>GROUPID</groupId><artifactId>ARTIFACTID</artifactId>' \
            '<version>VERSION</version></project>' > "$TPOM"

          install_jar() {
            local file="$1" gid="$2" aid="$3" ver="$4"
            if [ ! -f "$file" ]; then echo "  ERROR: not found: $file"; exit 1; fi
            local pom="/tmp/pom-${aid}.xml"
            sed -e "s|GROUPID|${gid}|" -e "s|ARTIFACTID|${aid}|" -e "s|VERSION|${ver}|" \
              "$TPOM" > "$pom"
            mvn install:install-file -q -Dfile="$file" -DpomFile="$pom" -Dpackaging=jar
            echo "  ✓ ${gid}:${aid}"
          }

          install_jar_optional() {
            local file="$1" gid="$2" aid="$3" ver="$4"
            if [ ! -f "$file" ]; then echo "  SKIP: $aid"; return; fi
            local pom="/tmp/pom-${aid}.xml"
            sed -e "s|GROUPID|${gid}|" -e "s|ARTIFACTID|${aid}|" -e "s|VERSION|${ver}|" \
              "$TPOM" > "$pom"
            mvn install:install-file -q -Dfile="$file" -DpomFile="$pom" -Dpackaging=jar
            echo "  ✓ ${gid}:${aid}"
          }

          install_jar "$J/dremio-sabot-kernel-${DREMIO_VER}.jar"         com.dremio          dremio-sabot-kernel         "$DREMIO_VER"
          install_jar "$J/dremio-sabot-kernel-${DREMIO_VER}-proto.jar"   com.dremio          dremio-sabot-kernel-proto   "$DREMIO_VER"
          install_jar "$J/dremio-common-${DREMIO_VER}.jar"               com.dremio          dremio-common               "$DREMIO_VER"
          install_jar "$J/dremio-plugin-common-${DREMIO_VER}.jar"        com.dremio.plugin   dremio-plugin-common        "$DREMIO_VER"
          install_jar "$J/dremio-sabot-vector-tools-${DREMIO_VER}.jar"   com.dremio          dremio-sabot-vector-tools   "$DREMIO_VER"
          install_jar "$J/dremio-services-namespace-${DREMIO_VER}.jar"   com.dremio          dremio-services-namespace   "$DREMIO_VER"
          install_jar "$J/dremio-connector-${DREMIO_VER}.jar"            com.dremio          dremio-connector            "$DREMIO_VER"
          install_jar "$J/dremio-sabot-logical-${DREMIO_VER}.jar"        com.dremio          dremio-sabot-logical        "$DREMIO_VER"
          install_jar "$J/dremio-common-core-${DREMIO_VER}.jar"          com.dremio          dremio-common-core          "$DREMIO_VER"
          install_jar_optional "$J/dremio-services-options-${DREMIO_VER}.jar"      com.dremio          dremio-services-options     "$DREMIO_VER"
          install_jar_optional "$J/dremio-services-datastore-${DREMIO_VER}.jar"   com.dremio          dremio-services-datastore   "$DREMIO_VER"
          install_jar_optional "$J/dremio-services-credentials-${DREMIO_VER}.jar" com.dremio.services dremio-services-credentials "$DREMIO_VER"
          echo "Dremio JAR installation complete."

      - name: Build connector JAR
        run: mvn package -DskipTests --batch-mode

      - name: Verify JAR was produced
        run: |
          JAR=$(ls target/dremio-dataverse-connector-*.jar 2>/dev/null | grep -v original | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: JAR not found in target/"
            exit 1
          fi
          echo "✓ Build succeeded: $(basename $JAR) ($(du -sh $JAR | cut -f1))"

      - name: Upload connector JAR
        uses: actions/upload-artifact@v4
        with:
          name: dremio-dataverse-connector
          path: dataverse/target/dremio-dataverse-connector-*.jar
          retention-days: 7
