name: Build Kafka Connector

on:
  push:
    branches: ["**"]
    paths:
      - 'kafka/**'
      - '.github/workflows/build-kafka.yml'
  pull_request:
    paths:
      - 'kafka/**'
      - '.github/workflows/build-kafka.yml'

jobs:
  build:
    name: Compile & package Kafka connector JAR
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kafka

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java 11 ───────────────────────────────────────────────────────────
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      # ── 3. Install Dremio JARs ───────────────────────────────────────────────
      # Dremio SDK JARs are extracted from the Docker image — these JARs are not
      # published to any public Maven repository at the build-stamp version.
      #
      # Each JAR is installed with a minimal 4-line POM (no <parent>) to prevent
      # Maven from chasing parent POMs for this build-stamp version.
      #
      # The `rm -rf ~/.m2/repository/com/dremio*` wipe at the top is essential:
      # setup-java restores the Maven cache from previous runs, which may contain
      # stale or partially-installed Dremio JARs that would shadow the fresh ones.
      - name: Install Dremio JARs from Docker image
        env:
          DREMIO_VERSION: 26.0.5-202509091642240013-f5051a07
          DREMIO_IMAGE: dremio/dremio-oss:26.0
        run: |
          echo "Pulling $DREMIO_IMAGE..."
          docker pull "$DREMIO_IMAGE" --quiet

          CONTAINER=$(docker create "$DREMIO_IMAGE")
          mkdir -p /tmp/dremio-jars
          docker cp "${CONTAINER}:/opt/dremio/jars" /tmp/dremio-jars/
          docker rm "$CONTAINER" > /dev/null
          JARS_DIR=/tmp/dremio-jars/jars

          # Wipe any stale cached Dremio JARs so the cache cannot shadow what
          # we install below. Maven local repo takes priority over remote repos,
          # so stale entries would otherwise silently override fresh installs.
          rm -rf ~/.m2/repository/com/dremio

          MINIMAL_POM=/tmp/dremio-minimal.pom
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<project><modelVersion>4.0.0</modelVersion>' \
            '<groupId>GROUPID</groupId><artifactId>ARTIFACT</artifactId>' \
            '<version>VERSION</version></project>' > "$MINIMAL_POM"

          install_jar() {
            local artifact="$1" groupId="${2:-com.dremio}"
            local jar
            jar=$(ls "${JARS_DIR}/${artifact}"-[0-9]*.jar 2>/dev/null | head -1)
            if [ -z "$jar" ]; then
              echo "  ERROR: JAR not found for ${artifact}"
              exit 1
            fi
            local pom="/tmp/pom-${artifact}.xml"
            sed -e "s|GROUPID|${groupId}|" \
                -e "s|ARTIFACT|${artifact}|" \
                -e "s|VERSION|${DREMIO_VERSION}|" \
                "$MINIMAL_POM" > "$pom"
            mvn install:install-file -q -Dfile="$jar" -DpomFile="$pom" -Dpackaging=jar
            echo "  ✓ ${groupId}:${artifact}"
          }

          echo "Installing Dremio JARs..."
          install_jar dremio-sabot-kernel
          install_jar dremio-common
          # dremio-sabot-kernel-proto is shaded into dremio-sabot-kernel;
          # install the kernel JAR under both artifact IDs.
          _kernel_jar=$(ls "${JARS_DIR}/dremio-sabot-kernel"-[0-9]*.jar 2>/dev/null | head -1)
          _proto_pom=/tmp/pom-dremio-sabot-kernel-proto.xml
          sed -e "s|GROUPID|com.dremio|" -e "s|ARTIFACT|dremio-sabot-kernel-proto|" \
              -e "s|VERSION|${DREMIO_VERSION}|" "$MINIMAL_POM" > "$_proto_pom"
          mvn install:install-file -q -Dfile="$_kernel_jar" -DpomFile="$_proto_pom" -Dpackaging=jar
          echo "  ✓ com.dremio:dremio-sabot-kernel-proto (aliased from dremio-sabot-kernel)"
          install_jar dremio-sabot-vector-tools
          install_jar dremio-services-namespace
          install_jar dremio-connector
          install_jar dremio-sabot-logical
          install_jar dremio-common-core
          install_jar dremio-services-datastore
          install_jar dremio-plugin-common        "com.dremio.plugin"
          install_jar dremio-services-credentials "com.dremio.services"
          echo "Dremio JAR installation complete."

          # Diagnostic: confirm exec.catalog classes are present in the
          # installed kernel JAR. If missing, scan all Docker JARs for them.
          KERNEL_M2=$(ls ~/.m2/repository/com/dremio/dremio-sabot-kernel/*/dremio-sabot-kernel-*.jar 2>/dev/null | head -1)
          CATALOG_COUNT=$(jar tf "$KERNEL_M2" 2>/dev/null | grep -c "com/dremio/exec/catalog" || true)
          echo "=== Diagnostic: exec.catalog classes in installed kernel JAR: ${CATALOG_COUNT} ==="
          if [ "$CATALOG_COUNT" -gt 0 ]; then
            echo "  ✓ exec.catalog is present — classpath should be correct"
          else
            echo "  ✗ exec.catalog NOT in kernel JAR — scanning all Docker JARs:"
            for j in "${JARS_DIR}"/*.jar "${JARS_DIR}"/3rdparty/*.jar; do
              [ -f "$j" ] || continue
              c=$(jar tf "$j" 2>/dev/null | grep -c "com/dremio/exec/catalog" || true)
              [ "$c" -gt 0 ] && echo "    FOUND ($c classes) in: $(basename "$j")"
            done
          fi

      # ── 4. Build ─────────────────────────────────────────────────────────────
      # Apache Kafka client + Avro + Confluent Schema Registry are in pom.xml
      # repositories (Maven Central + Confluent) and download automatically.
      - name: Build connector JAR
        run: mvn package -DskipTests --batch-mode

      # ── 5. Verify output ─────────────────────────────────────────────────────
      - name: Verify plugin JAR was produced
        run: |
          JAR=$(ls target/dremio-kafka-connector-*-plugin.jar 2>/dev/null | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: plugin JAR not found in target/"
            exit 1
          fi
          echo "✓ Build succeeded: $(basename $JAR) ($(du -sh $JAR | cut -f1))"

      # ── 6. Upload artifact ───────────────────────────────────────────────────
      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: dremio-kafka-connector-plugin
          path: kafka/target/dremio-kafka-connector-*-plugin.jar
          retention-days: 7
