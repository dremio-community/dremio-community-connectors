name: Build Delta Lake Connector

on:
  push:
    branches: ["**"]
    paths:
      - 'delta/**'
      - '.github/workflows/build-delta.yml'
  pull_request:
    paths:
      - 'delta/**'
      - '.github/workflows/build-delta.yml'

jobs:
  build:
    name: Compile & package Delta Lake connector JAR
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: delta

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java 11 ───────────────────────────────────────────────────────────
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      # ── 3. Install Dremio JARs ───────────────────────────────────────────────
      # Download SDK JARs directly from maven.dremio.com/public — these are the
      # real published JARs that include com.dremio.exec.catalog, exec.store, etc.
      # Docker runtime JARs lack those SDK packages and cannot be used to compile.
      # Each JAR is installed with a minimal 4-line POM (no <parent>) to prevent
      # Maven from chasing parent POMs for this build-stamp version.
      # hadoop-common is declared in pom.xml with its exact version and the
      # dremio-public repository, so Maven resolves it automatically.
      - name: Install Dremio JARs from maven.dremio.com
        env:
          DREMIO_VER: 26.0.5-202509091642240013-f5051a07
          DREMIO_REPO: https://maven.dremio.com/public
        run: |
          MINIMAL_POM=/tmp/dremio-minimal.pom
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<project><modelVersion>4.0.0</modelVersion>' \
            '<groupId>GROUPID</groupId><artifactId>ARTIFACT</artifactId>' \
            '<version>VERSION</version></project>' > "$MINIMAL_POM"

          install_jar() {
            local groupId="$1" artifact="$2" version="${3:-$DREMIO_VER}"
            local groupPath; groupPath=$(echo "$groupId" | tr '.' '/')
            local url="${DREMIO_REPO}/${groupPath}/${artifact}/${version}/${artifact}-${version}.jar"
            local dest="/tmp/${artifact}.jar"
            echo "  Downloading ${artifact}..."
            if ! curl -sSfL -o "$dest" "$url"; then
              echo "  ERROR: failed to download ${artifact}"
              echo "  URL tried: ${url}"
              exit 1
            fi
            local pom="/tmp/pom-${artifact}.xml"
            sed -e "s|GROUPID|${groupId}|" \
                -e "s|ARTIFACT|${artifact}|" \
                -e "s|VERSION|${version}|" \
                "$MINIMAL_POM" > "$pom"
            mvn install:install-file -q -Dfile="$dest" -DpomFile="$pom" -Dpackaging=jar
            echo "  ✓ ${groupId}:${artifact}"
          }

          echo "Installing Dremio JARs..."
          install_jar "com.dremio"        "dremio-sabot-kernel"
          install_jar "com.dremio"        "dremio-common"
          install_jar "com.dremio"        "dremio-sabot-vector-tools"
          install_jar "com.dremio"        "dremio-services-namespace"
          install_jar "com.dremio"        "dremio-connector"
          install_jar "com.dremio"        "dremio-sabot-logical"
          install_jar "com.dremio"        "dremio-common-core"
          install_jar "com.dremio"        "dremio-services-catalog"
          install_jar "com.dremio.plugin" "dremio-plugin-common"

          # dremio-sabot-kernel-proto is shaded into dremio-sabot-kernel in the
          # published artifact too; install the kernel JAR under both artifact IDs.
          _proto_pom=/tmp/pom-dremio-sabot-kernel-proto.xml
          sed -e "s|GROUPID|com.dremio|" \
              -e "s|ARTIFACT|dremio-sabot-kernel-proto|" \
              -e "s|VERSION|${DREMIO_VER}|" \
              "$MINIMAL_POM" > "$_proto_pom"
          mvn install:install-file -q \
            -Dfile="/tmp/dremio-sabot-kernel.jar" \
            -DpomFile="$_proto_pom" \
            -Dpackaging=jar
          echo "  ✓ com.dremio:dremio-sabot-kernel-proto (aliased from dremio-sabot-kernel)"
          echo "Dremio JAR installation complete."

      # ── 4. Build ─────────────────────────────────────────────────────────────
      # delta-standalone, Parquet, Protobuf, and hadoop-common (Dremio-flavoured,
      # version pinned in pom.xml) are resolved from Maven Central + dremio-public.
      - name: Build connector JAR
        run: mvn package -DskipTests --batch-mode

      # ── 5. Verify output ─────────────────────────────────────────────────────
      - name: Verify plugin JAR was produced
        run: |
          JAR=$(ls target/dremio-delta-connector-*-plugin.jar 2>/dev/null | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: plugin JAR not found in target/"
            exit 1
          fi
          echo "✓ Build succeeded: $(basename $JAR) ($(du -sh $JAR | cut -f1))"

      # ── 6. Upload artifact ───────────────────────────────────────────────────
      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: dremio-delta-connector-plugin
          path: delta/target/dremio-delta-connector-*-plugin.jar
          retention-days: 7
