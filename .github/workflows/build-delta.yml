name: Build Delta Lake Connector

on:
  push:
    branches: ["**"]
    paths:
      - 'delta/**'
      - '.github/workflows/build-delta.yml'
  pull_request:
    paths:
      - 'delta/**'
      - '.github/workflows/build-delta.yml'

jobs:
  build:
    name: Compile & package Delta Lake connector JAR
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: delta

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java 11 ───────────────────────────────────────────────────────────
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      # ── 3. Install Dremio JARs ───────────────────────────────────────────────
      - name: Install Dremio JARs to local Maven repo
        env:
          DREMIO_VERSION: 26.0.5-202509091642240013-f5051a07
          DREMIO_IMAGE: dremio/dremio-oss:26.0
        run: |
          echo "Pulling Dremio OSS image: $DREMIO_IMAGE"
          docker pull "$DREMIO_IMAGE" --quiet

          CONTAINER=$(docker create "$DREMIO_IMAGE")
          mkdir -p /tmp/dremio-jars
          docker cp "${CONTAINER}:/opt/dremio/jars" /tmp/dremio-jars/
          docker rm "$CONTAINER" > /dev/null

          JARS_DIR=/tmp/dremio-jars/jars

          MINIMAL_POM=/tmp/dremio-minimal.pom
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<project><modelVersion>4.0.0</modelVersion>' \
            '<groupId>GROUPID</groupId><artifactId>ARTIFACT</artifactId>' \
            '<version>VERSION</version></project>' > "$MINIMAL_POM"

          install_jar() {
            local artifact="$1" groupId="${2:-com.dremio}"
            local jar
            jar=$(ls "${JARS_DIR}/${artifact}"-[0-9]*.jar 2>/dev/null | head -1)
            if [ -z "$jar" ]; then
              echo "  WARN: JAR not found for ${artifact} — skipping"
              return
            fi
            local pom="/tmp/pom-${artifact}.xml"
            sed -e "s|GROUPID|${groupId}|" \
                -e "s|ARTIFACT|${artifact}|" \
                -e "s|VERSION|${DREMIO_VERSION}|" \
                "$MINIMAL_POM" > "$pom"
            mvn install:install-file -q \
              -Dfile="$jar" \
              -DpomFile="$pom" \
              -Dpackaging=jar
            echo "  ✓ installed ${artifact} (${groupId})"
          }

          echo "Installing Dremio core JARs..."
          install_jar dremio-sabot-kernel
          install_jar dremio-common
          # dremio-sabot-kernel-proto is shaded into dremio-sabot-kernel in the Docker image.
          # Install the kernel JAR under both artifact IDs.
          _kernel_jar=$(ls "${JARS_DIR}/dremio-sabot-kernel"-[0-9]*.jar 2>/dev/null | head -1)
          _proto_pom=/tmp/pom-dremio-sabot-kernel-proto.xml
          sed -e "s|GROUPID|com.dremio|" -e "s|ARTIFACT|dremio-sabot-kernel-proto|" \
              -e "s|VERSION|${DREMIO_VERSION}|" "$MINIMAL_POM" > "$_proto_pom"
          mvn install:install-file -q -Dfile="$_kernel_jar" -DpomFile="$_proto_pom" -Dpackaging=jar
          echo "  ✓ installed dremio-sabot-kernel-proto (aliased from dremio-sabot-kernel)"
          install_jar dremio-sabot-vector-tools
          install_jar dremio-services-namespace
          install_jar dremio-connector
          install_jar dremio-sabot-logical
          install_jar dremio-common-core
          install_jar dremio-services-catalog
          install_jar dremio-plugin-common "com.dremio.plugin"

          # Install Hadoop common from Dremio's 3rdparty JARs
          HADOOP_JAR=$(ls "${JARS_DIR}/3rdparty/hadoop-common"-*.jar 2>/dev/null | head -1)
          if [ -n "$HADOOP_JAR" ]; then
            HADOOP_VER=$(basename "$HADOOP_JAR" .jar | sed 's/hadoop-common-//')
            mvn install:install-file -q \
              -Dfile="$HADOOP_JAR" \
              -DgroupId=org.apache.hadoop \
              -DartifactId=hadoop-common \
              -Dversion="$HADOOP_VER" \
              -Dpackaging=jar
            echo "  ✓ installed hadoop-common ${HADOOP_VER}"
            sed -i "s|<hadoop.version>.*</hadoop.version>|<hadoop.version>${HADOOP_VER}</hadoop.version>|" pom.xml
          fi

          echo "Dremio JAR installation complete."

      # ── 4. Build ─────────────────────────────────────────────────────────────
      # delta-standalone, Parquet, Protobuf are resolved from Maven Central.
      - name: Build connector JAR
        run: mvn package -DskipTests --batch-mode

      # ── 5. Verify output ─────────────────────────────────────────────────────
      - name: Verify plugin JAR was produced
        run: |
          JAR=$(ls target/dremio-delta-connector-*-plugin.jar 2>/dev/null | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: plugin JAR not found in target/"
            exit 1
          fi
          echo "✓ Build succeeded: $(basename $JAR) ($(du -sh $JAR | cut -f1))"

      # ── 6. Upload artifact ───────────────────────────────────────────────────
      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: dremio-delta-connector-plugin
          path: delta/target/dremio-delta-connector-*-plugin.jar
          retention-days: 7
