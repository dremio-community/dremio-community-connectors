<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>

    <!-- Background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#05101f"/>
      <stop offset="100%" stop-color="#0c2038"/>
    </linearGradient>

    <!-- Right-side darkening for text contrast -->
    <linearGradient id="rightDim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0c2038" stop-opacity="0"/>
      <stop offset="100%" stop-color="#060e1c" stop-opacity="0.55"/>
    </linearGradient>

    <!-- Narwhal body -->
    <linearGradient id="bodyGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%"   stop-color="#deeeff"/>
      <stop offset="100%" stop-color="#8ec8e8"/>
    </linearGradient>

    <!-- Narwhal belly highlight -->
    <linearGradient id="bellyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.18"/>
    </linearGradient>

    <!-- Horn -->
    <linearGradient id="hornGrad" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#88d8f8"/>
      <stop offset="55%"  stop-color="#d8f4ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <!-- Data stream (horizontal fade) -->
    <linearGradient id="streamGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00c8ff" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#00c8ff" stop-opacity="0.7"/>
      <stop offset="75%"  stop-color="#00c8ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Narwhal aura -->
    <radialGradient id="aura" cx="52%" cy="50%" r="42%">
      <stop offset="0%"   stop-color="#1060a0" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#05101f"  stop-opacity="0"/>
    </radialGradient>

    <!-- Horn glow filter -->
    <filter id="hornGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Body soft glow -->
    <filter id="bodyGlow" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Star twinkle -->
    <filter id="sparkle" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#00aaff" flood-opacity="0.5"/>
    </filter>

    <!-- Clip path for badge text -->
    <clipPath id="badgeClip">
      <rect x="720" y="0" width="560" height="640"/>
    </clipPath>

  </defs>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  BACKGROUND                                     -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Subtle dot grid -->
  <g fill="#2a5880" opacity="0.12">
    <circle cx="128" cy="64"  r="1.2"/> <circle cx="256" cy="64"  r="1.2"/>
    <circle cx="384" cy="64"  r="1.2"/> <circle cx="512" cy="64"  r="1.2"/>
    <circle cx="640" cy="64"  r="1.2"/> <circle cx="768" cy="64"  r="1.2"/>
    <circle cx="896" cy="64"  r="1.2"/> <circle cx="1024" cy="64" r="1.2"/>
    <circle cx="1152" cy="64" r="1.2"/>
    <circle cx="128" cy="128"  r="1.2"/> <circle cx="256" cy="128"  r="1.2"/>
    <circle cx="384" cy="128"  r="1.2"/> <circle cx="512" cy="128"  r="1.2"/>
    <circle cx="640" cy="128"  r="1.2"/> <circle cx="768" cy="128"  r="1.2"/>
    <circle cx="896" cy="128"  r="1.2"/> <circle cx="1024" cy="128" r="1.2"/>
    <circle cx="1152" cy="128" r="1.2"/>
    <circle cx="128" cy="192"  r="1.2"/> <circle cx="256" cy="192"  r="1.2"/>
    <circle cx="384" cy="192"  r="1.2"/> <circle cx="512" cy="192"  r="1.2"/>
    <circle cx="640" cy="192"  r="1.2"/> <circle cx="768" cy="192"  r="1.2"/>
    <circle cx="896" cy="192"  r="1.2"/> <circle cx="1024" cy="192" r="1.2"/>
    <circle cx="1152" cy="192" r="1.2"/>
    <circle cx="128" cy="256"  r="1.2"/> <circle cx="256" cy="256"  r="1.2"/>
    <circle cx="384" cy="256"  r="1.2"/> <circle cx="512" cy="256"  r="1.2"/>
    <circle cx="640" cy="256"  r="1.2"/> <circle cx="768" cy="256"  r="1.2"/>
    <circle cx="896" cy="256"  r="1.2"/> <circle cx="1024" cy="256" r="1.2"/>
    <circle cx="1152" cy="256" r="1.2"/>
    <circle cx="128" cy="320"  r="1.2"/> <circle cx="256" cy="320"  r="1.2"/>
    <circle cx="384" cy="320"  r="1.2"/> <circle cx="512" cy="320"  r="1.2"/>
    <circle cx="640" cy="320"  r="1.2"/> <circle cx="768" cy="320"  r="1.2"/>
    <circle cx="896" cy="320"  r="1.2"/> <circle cx="1024" cy="320" r="1.2"/>
    <circle cx="1152" cy="320" r="1.2"/>
    <circle cx="128" cy="384"  r="1.2"/> <circle cx="256" cy="384"  r="1.2"/>
    <circle cx="384" cy="384"  r="1.2"/> <circle cx="512" cy="384"  r="1.2"/>
    <circle cx="640" cy="384"  r="1.2"/> <circle cx="768" cy="384"  r="1.2"/>
    <circle cx="896" cy="384"  r="1.2"/> <circle cx="1024" cy="384" r="1.2"/>
    <circle cx="1152" cy="384" r="1.2"/>
    <circle cx="128" cy="448"  r="1.2"/> <circle cx="256" cy="448"  r="1.2"/>
    <circle cx="384" cy="448"  r="1.2"/> <circle cx="512" cy="448"  r="1.2"/>
    <circle cx="640" cy="448"  r="1.2"/> <circle cx="768" cy="448"  r="1.2"/>
    <circle cx="896" cy="448"  r="1.2"/> <circle cx="1024" cy="448" r="1.2"/>
    <circle cx="1152" cy="448" r="1.2"/>
    <circle cx="128" cy="512"  r="1.2"/> <circle cx="256" cy="512"  r="1.2"/>
    <circle cx="384" cy="512"  r="1.2"/> <circle cx="512" cy="512"  r="1.2"/>
    <circle cx="640" cy="512"  r="1.2"/> <circle cx="768" cy="512"  r="1.2"/>
    <circle cx="896" cy="512"  r="1.2"/> <circle cx="1024" cy="512" r="1.2"/>
    <circle cx="1152" cy="512" r="1.2"/>
    <circle cx="128" cy="576"  r="1.2"/> <circle cx="256" cy="576"  r="1.2"/>
    <circle cx="384" cy="576"  r="1.2"/> <circle cx="512" cy="576"  r="1.2"/>
    <circle cx="640" cy="576"  r="1.2"/> <circle cx="768" cy="576"  r="1.2"/>
    <circle cx="896" cy="576"  r="1.2"/> <circle cx="1024" cy="576" r="1.2"/>
    <circle cx="1152" cy="576" r="1.2"/>
  </g>

  <!-- Stars -->
  <g fill="white">
    <!-- Dim field stars -->
    <circle cx="42"  cy="30"  r="1"   opacity="0.35"/>
    <circle cx="110" cy="88"  r="1.2" opacity="0.5"/>
    <circle cx="75"  cy="155" r="0.9" opacity="0.3"/>
    <circle cx="205" cy="42"  r="0.9" opacity="0.4"/>
    <circle cx="455" cy="52"  r="1"   opacity="0.35"/>
    <circle cx="580" cy="28"  r="0.9" opacity="0.45"/>
    <circle cx="705" cy="68"  r="1.1" opacity="0.5"/>
    <circle cx="825" cy="22"  r="0.9" opacity="0.3"/>
    <circle cx="945" cy="48"  r="1"   opacity="0.4"/>
    <circle cx="1055" cy="88" r="1.2" opacity="0.35"/>
    <circle cx="1155" cy="32" r="0.9" opacity="0.5"/>
    <circle cx="1225" cy="112" r="1"  opacity="0.3"/>
    <circle cx="28"  cy="205" r="0.9" opacity="0.35"/>
    <circle cx="155" cy="248" r="1.2" opacity="0.45"/>
    <circle cx="1108" cy="162" r="1"  opacity="0.35"/>
    <circle cx="1205" cy="225" r="1.2" opacity="0.5"/>
    <circle cx="1245" cy="305" r="0.9" opacity="0.28"/>
    <circle cx="1185" cy="382" r="1"  opacity="0.4"/>
    <circle cx="1125" cy="455" r="1.2" opacity="0.35"/>
