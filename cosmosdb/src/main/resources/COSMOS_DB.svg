<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Cosmos DB icon: blue globe with cyan orbital ring, white clouds, sparkle stars -->

  <!-- Sparkle top-left -->
  <path d="M10 14 L11.5 10 L13 14 L17 15.5 L13 17 L11.5 21 L10 17 L6 15.5 Z"
        fill="#5DD8E8" opacity="0.9"/>

  <!-- Sparkle bottom-right -->
  <path d="M49 48 L50 45 L51 48 L54 49 L51 50 L50 53 L49 50 L46 49 Z"
        fill="#5DD8E8" opacity="0.9"/>

  <!-- Blue globe -->
  <circle cx="32" cy="32" r="20" fill="url(#globeGrad)"/>

  <!-- Cyan orbital ring (ellipse, slightly tilted) -->
  <ellipse cx="32" cy="32" rx="27" ry="9"
           fill="none" stroke="#5DD8E8" stroke-width="3.5"
           stroke-linecap="round"/>

  <!-- Clip globe over the front half of the ring -->
  <ellipse cx="32" cy="32" rx="27" ry="9"
           fill="none" stroke="#5DD8E8" stroke-width="3.5"
           stroke-dasharray="85 170" stroke-dashoffset="0"
           stroke-linecap="round"/>

  <!-- Cloud shape (left) -->
  <g fill="white" opacity="0.92">
    <circle cx="26" cy="33" r="5"/>
    <circle cx="31" cy="30" r="5.5"/>
    <circle cx="37" cy="33" r="4.5"/>
    <rect x="22" y="33" width="19" height="6" rx="0"/>
  </g>

  <!-- Gradient definition -->
  <defs>
    <radialGradient id="globeGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#4A9EDB"/>
      <stop offset="100%" stop-color="#1A4FA3"/>
    </radialGradient>
  </defs>
</svg>
