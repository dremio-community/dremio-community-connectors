        - "varchar"
        return: "date"
        rewrite: "toDate({0})"

    - names:
      - "now"
      - "current_timestamp"
      signatures:
      - args: []
        return: "timestamp"
        rewrite: "now()"

    - names:
      - "current_date"
      signatures:
      - args: []
        return: "date"
        rewrite: "today()"

  # -------------------------------------------------------------------------
  # Variable-length operators (concat, AND, OR, COALESCE)
  # -------------------------------------------------------------------------
  variable_length_operators:
  - names:
    - "concat"
    variable_signatures:
    - return: "varchar"
      arg_type: "varchar"
  - names:
    - "and"
    variable_signatures:
    - return: "boolean"
      arg_type: "boolean"
  - names:
    - "or"
    variable_signatures:
    - return: "boolean"
      arg_type: "boolean"
  - names:
    - "coalesce"
    variable_signatures:
    - return: "double"
      arg_type: "double"
    - return: "float"
      arg_type: "float"
    - return: "integer"
      arg_type: "integer"
    - return: "bigint"
      arg_type: "bigint"
    - return: "decimal"
      arg_type: "decimal"
    - return: "varchar"
      arg_type: "varchar"
    - return: "boolean"
      arg_type: "boolean"
    - return: "date"
      arg_type: "date"
    - return: "timestamp"
      arg_type: "timestamp"
