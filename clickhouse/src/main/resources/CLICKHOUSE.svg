<svg id="sources/CLICKHOUSE" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Yellow background -->
  <rect width="40" height="40" rx="6" fill="#FAFF69"/>

  <!-- ClickHouse logo: 4 full-height bars + 1 half-height bar (bottom-aligned) -->
  <!-- bar width=6, gap=1 → 5×6 + 4×1 = 34px total, 3px margins each side -->
  <!-- full bars: y=5..35 (height=30), half bar: y=20..35 (height=15) -->

  <!-- Bar 1 (full) -->
  <rect x="3"  y="5" width="6" height="30" rx="1" fill="#1A1A1A"/>
  <!-- Bar 2 (full) -->
  <rect x="10" y="5" width="6" height="30" rx="1" fill="#1A1A1A"/>
  <!-- Bar 3 (full) -->
  <rect x="17" y="5" width="6" height="30" rx="1" fill="#1A1A1A"/>
  <!-- Bar 4 (full) -->
  <rect x="24" y="5" width="6" height="30" rx="1" fill="#1A1A1A"/>
  <!-- Bar 5 (half-height, bottom-aligned) -->
  <rect x="31" y="20" width="6" height="15" rx="1" fill="#1A1A1A"/>
</svg>
