#
# Dremio ARP dialect definition for SingleStore.
#
# This YAML file drives all SQL translation, type mapping, predicate pushdown,
# aggregation pushdown, and scalar function support for the SingleStore connector.
#
# SingleStore references:
#   https://singlestore.com/kb/en/data-types/
#   https://singlestore.com/kb/en/built-in-functions/
#   https://singlestore.com/kb/en/select/
#

metadata:
  name: SingleStore
  apiname: SINGLESTORE
  spec_version: '1'

syntax:
  # SingleStore uses backtick for identifier quoting (ANSI double-quotes require
  # ANSI_QUOTES mode which is not enabled by default)
  identifier_quote: "`"
  identifier_length_limit: 64
  allows_boolean_literal: true
  map_boolean_literal_to_bit: false
  supports_catalogs: true
  supports_schemas: false

capabilities:
  max_nested_subqueries: 4
  subqueries_require_alias: true
  supports_distinct_on_non_aggregate: true
  supports_orderby_uncollapse: true

# ============================================================================
# DATA TYPE MAPPINGS
#
# Maps SingleStore JDBC type names -> Dremio types.
# The SingleStore Connector/J driver returns the base type name from
# ResultSetMetaData.getColumnTypeName().
# ============================================================================
data_types:
  mappings:

    # --- Integer types ---
    - source:
        name: "TINYINT"
      dremio:
        name: "INTEGER"
      required_cast_args: "none"
    - source:
        name: "TINYINT UNSIGNED"
      dremio:
        name: "INTEGER"
      required_cast_args: "none"
    - source:
        name: "SMALLINT"
      dremio:
        name: "INTEGER"
      required_cast_args: "none"
    - source:
        name: "SMALLINT UNSIGNED"
      dremio:
        name: "INTEGER"
      required_cast_args: "none"
    - source:
        name: "MEDIUMINT"
      dremio:
        name: "INTEGER"
      required_cast_args: "none"
    - source:
        name: "MEDIUMINT UNSIGNED"
      dremio:
        name: "INTEGER"
      required_cast_args: "none"
    - source:
        name: "INT"
      dremio:
        name: "INTEGER"
      required_cast_args: "none"
    - source:
        name: "INT UNSIGNED"
      dremio:
        name: "BIGINT"
      required_cast_args: "none"
    - source:
        name: "INTEGER"
      dremio:
        name: "INTEGER"
      required_cast_args: "none"
    - source:
        name: "INTEGER UNSIGNED"
      dremio:
        name: "BIGINT"
      required_cast_args: "none"
    - source:
        name: "BIGINT"
      dremio:
        name: "BIGINT"
      required_cast_args: "none"
    - source:
        name: "BIGINT UNSIGNED"
      dremio:
        name: "BIGINT"
      required_cast_args: "none"

    # --- Floating point ---
    - source:
        name: "FLOAT"
      dremio:
        name: "FLOAT"
      required_cast_args: "none"
    - source:
        name: "DOUBLE"
      dremio:
        name: "DOUBLE"
      required_cast_args: "none"
    - source:
        name: "DOUBLE PRECISION"
      dremio:
        name: "DOUBLE"
      required_cast_args: "none"
    - source:
        name: "REAL"
      dremio:
        name: "DOUBLE"
      required_cast_args: "none"

    # --- Decimal (arbitrary precision) ---
    - source:
        name: "DECIMAL"
      dremio:
        name: "DECIMAL"
      required_cast_args: "precision_scale"
    - source:
        name: "NUMERIC"
      dremio:
        name: "DECIMAL"
      required_cast_args: "precision_scale"
    - source:
        name: "DEC"
      dremio:
        name: "DECIMAL"
      required_cast_args: "precision_scale"

    # --- Boolean ---
    - source:
        name: "BIT"
      dremio:
        name: "BOOLEAN"
      required_cast_args: "none"
    - source:
        name: "BOOLEAN"
      dremio:
        name: "BOOLEAN"
      required_cast_args: "none"
    - source:
        name: "TINYINT(1)"
      dremio:
        name: "BOOLEAN"
      required_cast_args: "none"

    # --- String types ---
    - source:
        name: "CHAR"
      dremio:
        name: "VARCHAR"
      required_cast_args: "none"
    - source:
        name: "VARCHAR"
      dremio:
        name: "VARCHAR"
      required_cast_args: "none"
    - source:
        name: "TINYTEXT"
      dremio:
        name: "VARCHAR"
      required_cast_args: "none"
    - source:
        name: "TEXT"
      dremio:
        name: "VARCHAR"
      required_cast_args: "none"
    - source:
        name: "MEDIUMTEXT"
      dremio:
        name: "VARCHAR"
      required_cast_args: "none"
    - source:
        name: "LONGTEXT"
      dremio:
        name: "VARCHAR"
      required_cast_args: "none"
    - source:
        name: "ENUM"
      dremio:
        name: "VARCHAR"
      required_cast_args: "none"
    - source:
        name: "SET"
      dremio:
        name: "VARCHAR"
      required_cast_args: "none"

    # --- JSON (SingleStore 10.2+) ---
    - source:
        name: "JSON"
      dremio:
        name: "VARCHAR"
      required_cast_args: "none"
    - source:
        name: "LONGTEXT JSON"
      dremio:
        name: "VARCHAR"
      required_cast_args: "none"

    # --- UUID (SingleStore 10.7+) ---
    - source:
        name: "UUID"
      dremio:
        name: "VARCHAR"
      required_cast_args: "none"

    # --- Binary types — surfaced as VARCHAR (hex representation) ---
    - source:
        name: "BINARY"
      dremio:
        name: "VARCHAR"
      required_cast_args: "none"
    - source:
        name: "VARBINARY"
      dremio:
        name: "VARCHAR"
      required_cast_args: "none"
    - source:
        name: "TINYBLOB"
      dremio:
        name: "VARCHAR"
      required_cast_args: "none"
    - source:
        name: "BLOB"
      dremio:
        name: "VARCHAR"
      required_cast_args: "none"
    - source:
        name: "MEDIUMBLOB"
      dremio:
        name: "VARCHAR"
      required_cast_args: "none"
    - source:
        name: "LONGBLOB"
      dremio:
        name: "VARCHAR"
      required_cast_args: "none"

    # --- Date / Time ---
    - source:
        name: "DATE"
      dremio:
        name: "DATE"
      required_cast_args: "none"
    - source:
        name: "DATETIME"
      dremio:
        name: "TIMESTAMP"
      required_cast_args: "none"
    - source:
        name: "TIMESTAMP"
      dremio:
        name: "TIMESTAMP"
      required_cast_args: "none"
    # TIME has no direct Dremio equivalent; surface as VARCHAR
    - source:
        name: "TIME"
      dremio:
        name: "VARCHAR"
      required_cast_args: "none"
    - source:
        name: "YEAR"
      dremio:
        name: "INTEGER"
      required_cast_args: "none"

# ============================================================================
# RELATIONAL ALGEBRA — what Dremio can push down to SingleStore
# ============================================================================
relational_algebra:

  aggregation:
    enable: true
    group_by_ordinal: false
    distinct: true
    count_functions:
      count_star:
        enable: true
      count:
        enable: true
      count_distinct:
        enable: true
    functions:
      - names:
          - "sum"
        signatures:
          - args: ["double"]
            return: "double"
          - args: ["integer"]
            return: "bigint"
          - args: ["bigint"]
            return: "bigint"
          - args: ["float"]
            return: "double"
          - args: ["decimal"]
            return: "decimal"
      - names:
          - "avg"
        signatures:
          - args: ["double"]
            return: "double"
          - args: ["integer"]
            return: "double"
          - args: ["bigint"]
            return: "double"
          - args: ["float"]
            return: "double"
          - args: ["decimal"]
            return: "decimal"
      - names:
          - "min"
          - "max"
        signatures:
          - args: ["double"]
            return: "double"
          - args: ["integer"]
            return: "integer"
          - args: ["bigint"]
            return: "bigint"
          - args: ["float"]
            return: "float"
          - args: ["decimal"]
            return: "decimal"
          - args: ["varchar"]
            return: "varchar"
          - args: ["date"]
            return: "date"
          - args: ["timestamp"]
            return: "timestamp"
      # stddev_pop / stddev_samp
      - names:
          - "stddev_pop"
        signatures:
          - args: ["double"]
            return: "double"
          - args: ["integer"]
            return: "double"
          - args: ["bigint"]
            return: "double"
          - args: ["decimal"]
            return: "double"
      - names:
          - "stddev_samp"
        signatures:
          - args: ["double"]
            return: "double"
          - args: ["integer"]
            return: "double"
          - args: ["bigint"]
            return: "double"
          - args: ["decimal"]
            return: "double"
      # var_pop / var_samp
      - names:
          - "var_pop"
        signatures:
          - args: ["double"]
            return: "double"
          - args: ["integer"]
            return: "double"
          - args: ["bigint"]
            return: "double"
      - names:
          - "var_samp"
        signatures:
          - args: ["double"]
            return: "double"
          - args: ["integer"]
            return: "double"
          - args: ["bigint"]
            return: "double"
      - names:
          - "single_value"
        signatures:
          - args: ["varchar"]
            return: "varchar"
            rewrite: "ANY_VALUE({0})"
          - args: ["integer"]
            return: "integer"
            rewrite: "ANY_VALUE({0})"
          - args: ["bigint"]
            return: "bigint"
            rewrite: "ANY_VALUE({0})"
          - args: ["double"]
            return: "double"
            rewrite: "ANY_VALUE({0})"
          - args: ["decimal"]
            return: "decimal"
            rewrite: "ANY_VALUE({0})"
          - args: ["date"]
            return: "date"
            rewrite: "ANY_VALUE({0})"
          - args: ["timestamp"]
            return: "timestamp"
            rewrite: "ANY_VALUE({0})"

  project:
    enable: true

  filter:
    enable: true

  sort:
    enable: true
    order_by:
      enable: true
      default_nulls_ordering: high
    fetch_offset:
      offset_fetch:
        enable: true
        format: 'LIMIT {1} OFFSET {0}'
      offset_only:
        enable: false
      fetch_only:
        enable: true
        format: 'LIMIT {0}'

  union:
    enable: true

  union_all:
    enable: true

  values:
    enable: false
    method: 'values'

  join:
    enable: true
    cross:
      enable: true
    inner:
      enable: true
      inequality: true
    left:
      enable: true
      inequality: true
    right:
      enable: true
      inequality: true
    full:
      enable: false
      inequality: false

# ============================================================================
# EXPRESSIONS — scalar functions, operators, subqueries
# ============================================================================
expressions:

  subqueries:
    enable: true
    correlated: false
    scalar: true
    in_clause: true
    exists_clause: false

  supports_case: true
  supports_over: false

  datetime_formats:
    era:
      enable: false
    meridian:
      enable: true
    century:
      enable: false
    week_of_year:
      enable: true
    day_of_week:
      enable: true
    day_name_abbreviated:
      enable: true
    day_name:
      enable: true
    year_4:
      enable: true
    year_2:
      enable: true
    day_of_year:
      enable: true
    month:
      enable: true
    month_name_abbreviated:
      enable: true
    month_name:
      enable: true
    day_of_month:
      enable: true
    hour_12:
      enable: true
    hour_24:
      enable: true
    minute:
      enable: true
    second:
      enable: true
    millisecond:
      enable: false
    timezone_abbreviation:
      enable: false
    timezone_offset:
      enable: false

  window_functions: []

  operators:

    # -----------------------------------------------------------------------
    # Comparison
    # -----------------------------------------------------------------------
    - names:
      - "="
      - "<>"
      - "!="
      - ">"
      - ">="
      - "<"
      - "<="
      signatures:
      - args: ["double", "double"]
        return: "boolean"
      - args: ["float", "float"]
        return: "boolean"
      - args: ["integer", "integer"]
        return: "boolean"
      - args: ["bigint", "bigint"]
        return: "boolean"
      - args: ["decimal", "decimal"]
        return: "boolean"
      - args: ["varchar", "varchar"]
        return: "boolean"
      - args: ["boolean", "boolean"]
        return: "boolean"
      - args: ["date", "date"]
        return: "boolean"
      - args: ["timestamp", "timestamp"]
        return: "boolean"

    # -----------------------------------------------------------------------
    # Arithmetic
    # -----------------------------------------------------------------------
    - names:
      - "+"
      - "-"
      - "*"
      - "/"
      signatures:
      - args: ["double", "double"]
        return: "double"
      - args: ["float", "float"]
        return: "float"
      - args: ["integer", "integer"]
        return: "integer"
      - args: ["bigint", "bigint"]
        return: "bigint"
      - args: ["decimal", "decimal"]
        return: "decimal"

    - names:
      - "%"
      signatures:
      - args: ["integer", "integer"]
        return: "integer"
      - args: ["bigint", "bigint"]
        return: "bigint"

    - names:
      - "mod"
      signatures:
      - args: ["integer", "integer"]
        return: "integer"
      - args: ["bigint", "bigint"]
        return: "bigint"

    # -----------------------------------------------------------------------
    # Logical
    # -----------------------------------------------------------------------
    - names:
      - "not"
      signatures:
      - args: ["boolean"]
        return: "boolean"

    # -----------------------------------------------------------------------
    # IS NULL / IS NOT NULL
    # -----------------------------------------------------------------------
    - names:
      - "is null"
      - "is not null"
      signatures:
      - args: ["double"]
        return: "boolean"
      - args: ["float"]
        return: "boolean"
      - args: ["integer"]
        return: "boolean"
      - args: ["bigint"]
        return: "boolean"
      - args: ["decimal"]
        return: "boolean"
      - args: ["varchar"]
        return: "boolean"
      - args: ["boolean"]
        return: "boolean"
      - args: ["date"]
        return: "boolean"
      - args: ["timestamp"]
        return: "boolean"

    # -----------------------------------------------------------------------
    # LIKE / NOT LIKE
    # -----------------------------------------------------------------------
    - names:
      - "like"
      - "not like"
      signatures:
      - args: ["varchar", "varchar"]
        return: "boolean"

    # -----------------------------------------------------------------------
    # BETWEEN
    # -----------------------------------------------------------------------
    - names:
      - "between"
      - "not between"
      signatures:
      - args: ["integer", "integer", "integer"]
        return: "boolean"
      - args: ["bigint", "bigint", "bigint"]
        return: "boolean"
      - args: ["double", "double", "double"]
        return: "boolean"
      - args: ["float", "float", "float"]
        return: "boolean"
      - args: ["decimal", "decimal", "decimal"]
        return: "boolean"
      - args: ["varchar", "varchar", "varchar"]
        return: "boolean"
      - args: ["date", "date", "date"]
        return: "boolean"
      - args: ["timestamp", "timestamp", "timestamp"]
        return: "boolean"

    # -----------------------------------------------------------------------
    # IN / NOT IN
    # -----------------------------------------------------------------------
    - names:
      - "in"
      - "not in"
      signatures:
      - args: ["varchar"]
        return: "boolean"
      - args: ["integer"]
        return: "boolean"
      - args: ["bigint"]
        return: "boolean"
      - args: ["double"]
        return: "boolean"
      - args: ["float"]
        return: "boolean"
      - args: ["decimal"]
        return: "boolean"
      - args: ["date"]
        return: "boolean"
      - args: ["timestamp"]
        return: "boolean"
      - args: ["boolean"]
        return: "boolean"

    # -----------------------------------------------------------------------
    # NULLIF
    # -----------------------------------------------------------------------
    - names:
      - "nullif"
      signatures:
      - args: ["varchar", "varchar"]
        return: "varchar"
      - args: ["integer", "integer"]
        return: "integer"
      - args: ["bigint", "bigint"]
        return: "bigint"
      - args: ["double", "double"]
        return: "double"
      - args: ["decimal", "decimal"]
        return: "decimal"
      - args: ["date", "date"]
        return: "date"
      - args: ["timestamp", "timestamp"]
        return: "timestamp"

    # -----------------------------------------------------------------------
    # CAST — SingleStore supports standard ANSI CAST syntax
    # -----------------------------------------------------------------------
    - names:
      - "cast"
      signatures:
      - args: ["integer"]
        return: "integer"
        rewrite: "CAST({0} AS SIGNED)"
      - args: ["integer"]
        return: "bigint"
        rewrite: "CAST({0} AS SIGNED)"
      - args: ["integer"]
        return: "double"
        rewrite: "CAST({0} AS DOUBLE)"
      - args: ["integer"]
        return: "float"
        rewrite: "CAST({0} AS FLOAT)"
      - args: ["integer"]
        return: "varchar"
        rewrite: "CAST({0} AS CHAR)"
      - args: ["bigint"]
        return: "integer"
        rewrite: "CAST({0} AS SIGNED)"
      - args: ["bigint"]
        return: "bigint"
        rewrite: "CAST({0} AS SIGNED)"
      - args: ["bigint"]
        return: "double"
        rewrite: "CAST({0} AS DOUBLE)"
      - args: ["bigint"]
        return: "varchar"
        rewrite: "CAST({0} AS CHAR)"
      - args: ["double"]
        return: "integer"
        rewrite: "CAST({0} AS SIGNED)"
      - args: ["double"]
        return: "bigint"
        rewrite: "CAST({0} AS SIGNED)"
      - args: ["double"]
        return: "double"
        rewrite: "CAST({0} AS DOUBLE)"
      - args: ["double"]
        return: "float"
        rewrite: "CAST({0} AS FLOAT)"
      - args: ["double"]
        return: "varchar"
        rewrite: "CAST({0} AS CHAR)"
      - args: ["float"]
        return: "double"
        rewrite: "CAST({0} AS DOUBLE)"
      - args: ["float"]
        return: "float"
        rewrite: "CAST({0} AS FLOAT)"
      - args: ["float"]
        return: "varchar"
        rewrite: "CAST({0} AS CHAR)"
      - args: ["varchar"]
        return: "integer"
        rewrite: "CAST({0} AS SIGNED)"
      - args: ["varchar"]
        return: "bigint"
        rewrite: "CAST({0} AS SIGNED)"
      - args: ["varchar"]
        return: "double"
        rewrite: "CAST({0} AS DOUBLE)"
      - args: ["varchar"]
        return: "float"
        rewrite: "CAST({0} AS FLOAT)"
      - args: ["varchar"]
        return: "varchar"
        rewrite: "CAST({0} AS CHAR)"
      - args: ["varchar"]
        return: "date"
        rewrite: "CAST({0} AS DATE)"
      - args: ["varchar"]
        return: "timestamp"
        rewrite: "CAST({0} AS DATETIME)"
      - args: ["date"]
        return: "timestamp"
        rewrite: "CAST({0} AS DATETIME)"
      - args: ["date"]
        return: "varchar"
        rewrite: "CAST({0} AS CHAR)"
      - args: ["timestamp"]
        return: "date"
        rewrite: "CAST({0} AS DATE)"
      - args: ["timestamp"]
        return: "varchar"
        rewrite: "CAST({0} AS CHAR)"
      - args: ["timestamp"]
        return: "timestamp"
        rewrite: "CAST({0} AS DATETIME)"
      - args: ["integer"]
        return: "decimal"
        rewrite: "CAST({0} AS DECIMAL(38,9))"
      - args: ["bigint"]
        return: "decimal"
        rewrite: "CAST({0} AS DECIMAL(38,9))"
      - args: ["double"]
        return: "decimal"
        rewrite: "CAST({0} AS DECIMAL(38,9))"
      - args: ["decimal"]
        return: "integer"
        rewrite: "CAST({0} AS SIGNED)"
      - args: ["decimal"]
        return: "bigint"
        rewrite: "CAST({0} AS SIGNED)"
      - args: ["decimal"]
        return: "double"
        rewrite: "CAST({0} AS DOUBLE)"
      - args: ["decimal"]
        return: "varchar"
        rewrite: "CAST({0} AS CHAR)"
      - args: ["boolean"]
        return: "boolean"
        rewrite: "CAST({0} AS SIGNED)"
      - args: ["boolean"]
        return: "integer"
        rewrite: "CAST({0} AS SIGNED)"
      - args: ["boolean"]
        return: "varchar"
        rewrite: "CAST({0} AS CHAR)"

    # -----------------------------------------------------------------------
    # String functions
    # -----------------------------------------------------------------------
    - names:
      - "char_length"
      - "character_length"
      signatures:
      - args: ["varchar"]
        return: "integer"
        rewrite: "CHAR_LENGTH({0})"

    - names:
      - "upper"
      - "ucase"
      signatures:
      - args: ["varchar"]
        return: "varchar"

    - names:
      - "lower"
      - "lcase"
      signatures:
      - args: ["varchar"]
        return: "varchar"

    - names:
      - "ltrim"
      signatures:
      - args: ["varchar"]
        return: "varchar"

    - names:
      - "rtrim"
      signatures:
      - args: ["varchar"]
        return: "varchar"

    - names:
      - "trim"
      signatures:
      - args: ["varchar"]
        return: "varchar"

    - names:
      - "substr"
      - "substring"
      signatures:
      - args: ["varchar", "integer"]
        return: "varchar"
        rewrite: "SUBSTRING({0}, {1})"
      - args: ["varchar", "integer", "integer"]
        return: "varchar"
        rewrite: "SUBSTRING({0}, {1}, {2})"

    # SingleStore: LOCATE(substr, str) — same arg order as Dremio
    - names:
      - "locate"
      signatures:
      - args: ["varchar", "varchar"]
        return: "integer"
        rewrite: "LOCATE({0}, {1})"
      - args: ["varchar", "varchar", "integer"]
        return: "integer"
        rewrite: "LOCATE({0}, {1}, {2})"

    - names:
      - "position"
      signatures:
      - args: ["varchar", "varchar"]
        return: "integer"
        rewrite: "LOCATE({0}, {1})"

    - names:
      - "replace"
      signatures:
      - args: ["varchar", "varchar", "varchar"]
        return: "varchar"

    - names:
      - "reverse"
      signatures:
      - args: ["varchar"]
        return: "varchar"

    - names:
      - "left"
      signatures:
      - args: ["varchar", "integer"]
        return: "varchar"

    - names:
      - "right"
      signatures:
      - args: ["varchar", "integer"]
        return: "varchar"

    - names:
      - "lpad"
      signatures:
      - args: ["varchar", "integer", "varchar"]
        return: "varchar"

    - names:
      - "rpad"
      signatures:
      - args: ["varchar", "integer", "varchar"]
        return: "varchar"

    - names:
      - "space"
      signatures:
      - args: ["integer"]
        return: "varchar"

    - names:
      - "ascii"
      signatures:
      - args: ["varchar"]
        return: "integer"

    - names:
      - "chr"
      signatures:
      - args: ["integer"]
        return: "varchar"
        rewrite: "CHAR({0})"

    - names:
      - "to_hex"
      signatures:
      - args: ["integer"]
        return: "varchar"
        rewrite: "HEX({0})"
      - args: ["bigint"]
        return: "varchar"
